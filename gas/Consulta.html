<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root{ --bg:#0C0C0C; --surface:#161616; --surface-hover:#222; --text:#f4f4f4; --text-dim:#9EA3A8;
           --azul:#1D8ECE; --vermelho:#E2231A; --verde:#009E49; --amarelo:#FFF200; }
    *{box-sizing:border-box;}
    body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:24px;}
    .card{background:var(--surface);border-radius:8px;padding:32px;max-width:420px;width:100%;}
    h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;margin-top:0;color:var(--azul);}
    input{width:100%;padding:12px;font-size:1rem;border-radius:4px;border:1px solid #333;background:#0C0C0C;color:#fff;margin-bottom:12px;}
    button{width:100%;padding:12px;font-size:1rem;border:none;border-radius:4px;background:var(--vermelho);color:#fff;font-weight:bold;cursor:pointer;}
    button:disabled{opacity:.6;}
    .spinner{display:inline-block;width:15px;height:15px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .resultado{margin-top:15px;padding:16px;border-radius:6px;cursor:pointer;transition:background .2s;border-left:4px solid transparent;}
    .resultado:hover{background:var(--surface-hover);}
    .aprovado{background:#10261a;border-left-color:var(--verde);}
    .espera{background:#332e10;border-left-color:var(--amarelo);}
    .pendente{background:#2a1414;border-left-color:var(--vermelho);}
    .expirado{background:#222;border-left-color:#555;opacity:.7;}
    .resultado-header{display:flex;justify-content:space-between;align-items:center;}
    .resultado-header h3{margin:0;font-size:1rem;}
    .resultado-detalhes{display:none;margin-top:15px;padding-top:15px;border-top:1px solid #333;font-size:.85rem;color:var(--text-dim);line-height:1.5;}
    .resultado.open .resultado-detalhes{display:block;}
    .msg-erro{color:var(--vermelho);font-size:.9rem;}
    .menu-voltar{margin-top:25px;font-size:14px;}
    .menu-voltar a{color:var(--text-dim);text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Consultar Inscrição</h1>
    <p style="color:var(--text-dim);font-size:.85rem;">Digite seu CPF para consultar. Clique no resultado para ver mais detalhes.</p>
    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric">
    <button id="btn" onclick="consultar()">Consultar</button>
    <div id="saida"></div>
  </div>
  <div class="menu-voltar"><a href="<?= ScriptApp.getService().getUrl() ?>">⬅ Voltar à tela inicial</a></div>

  <script>
    document.getElementById('cpf').addEventListener('input',function(e){
      let v=e.target.value.replace(/\D/g,'').slice(0,11);
      if(v.length>9) v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
      else if(v.length>6) v=v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
      else if(v.length>3) v=v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
      e.target.value=v;
    });
    function toggleDetalhes(el){ el.classList.toggle('open'); }

    function consultar(){
      const btn=document.getElementById('btn'), saida=document.getElementById('saida');
      btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Consultando...'; saida.innerHTML='';
      google.script.run
        .withSuccessHandler(function(resp){
          btn.disabled=false; btn.textContent='Consultar';
          if(!resp.encontrado){ saida.innerHTML='<p class="msg-erro">'+resp.message+'</p>'; return; }
          saida.innerHTML=resp.resultados.map(function(r){
            let cls='pendente',texto='',msgExp='';
            if(r.statusVaga==='APROVADO'){ cls='aprovado'; texto='✅ Aprovado — '+r.posicao+'º lugar'; }
            else if(r.statusVaga==='LISTA DE ESPERA'){ cls='espera'; texto='📋 Lista de espera — pos. '+r.posicao; }
            else if(r.status==='EXPIRADO'){ cls='expirado'; texto='❌ Expirado'; msgExp='<p style="color:#ff6b6b">Prazo encerrado em: '+r.dataExpiracao+'</p>'; }
            else{ cls='pendente'; texto='⏳ Aguardando Pagamento'; msgExp='<p style="color:#f39c12">Atenção: expira em '+r.dataExpiracao+'</p>'; }
            return '<div class="resultado '+cls+'" onclick="toggleDetalhes(this)">'
              +'<div class="resultado-header"><h3>'+r.instrumento+'</h3><span style="font-size:.8rem;">'+texto+' ▾</span></div>'
              +'<div class="resultado-detalhes"><p>Inscrição gerada em: '+r.dataInscricao+'</p>'+msgExp
              +'<p style="margin-top:8px;font-size:.75rem;">ID de segurança validado.</p></div></div>';
          }).join('');
        })
        .withFailureHandler(function(err){ btn.disabled=false; btn.textContent='Consultar'; saida.innerHTML='<p class="msg-erro">Erro: '+err.message+'</p>'; })
        .consultarPosicaoPorCpf(document.getElementById('cpf').value);
    }
  </script>
</body>
</html>
